<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cadastro de Produtos</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white shadow-lg rounded-xl p-8 w-full max-w-2xl">
  <h1 class="text-2xl font-bold mb-6 text-center">Cadastro de Produto</h1>

  <form id="formProduto" class="grid grid-cols-2 gap-4">
    <input name="nome" placeholder="Nome do Produto" class="col-span-2 p-2 border rounded" required>
    
    <textarea name="descricao" placeholder="Descrição" class="col-span-2 p-2 border rounded"></textarea>

    <input name="preco" type="number" step="0.01" placeholder="Preço (Ex: 19.90)" class="p-2 border rounded" required>
    
    <input name="estoque" type="number" placeholder="Quantidade em Estoque" class="p-2 border rounded" required>

    <button type="submit" class="col-span-2 bg-green-500 text-white p-2 rounded hover:bg-green-600 font-bold">
      Salvar Produto
    </button>
  </form>

  <p id="msg" class="mt-4 text-center"></p>
  <div class="text-center mt-4">
      <a href="index.html" class="text-blue-500 underline">Ir para Cadastro de Pessoas</a>
  </div>
</div>

<script>
document.getElementById("formProduto").addEventListener("submit", async (e) => {
  e.preventDefault();

  const formData = new FormData(e.target);
  const data = Object.fromEntries(formData.entries());

  try {
    const response = await fetch("http://localhost:3000/produtos", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });

    const result = await response.json();

    if(result.success) {
        document.getElementById("msg").innerText = "Produto cadastrado com sucesso!";
        document.getElementById("msg").className = "mt-4 text-center text-green-600";
        e.target.reset();
    } else {
        throw new Error(result.error);
    }

  } catch (error) {
    document.getElementById("msg").innerText = "Erro ao cadastrar produto!";
    document.getElementById("msg").className = "mt-4 text-center text-red-600";
    console.error(error);
  }
});
</script>
</body>
</html>
