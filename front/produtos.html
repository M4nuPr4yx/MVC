<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 20px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .top-buttons {
            text-align: center;
            margin-bottom: 10px;
        }

        form {
            background: white;
            padding: 20px;
            border-radius: 10px;
            max-width: 400px;
            margin: auto;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            font-size: 14px;
            margin-bottom: 5px;
            display: block;
        }

        input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        input:focus {
            border-color: #4CAF50;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button[type="submit"] {
            background: #4CAF50;
            color: white;
            width: 100%;
            margin-top: 10px;
        }

        button[type="button"] {
            background: #4CAF50;
            color: white;
            margin-right: 10px;
        }

        /* Modal */
        #modalPesquisa {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
        }

        .modal-content {
            background: white;
            margin: 5% auto;
            padding: 20px;
            width: 90%;
            max-width: 700px;
            border-radius: 10px;
        }

        .btn-fechar {
            float: right;
            cursor: pointer;
            color: red;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: #f0f0f0;
        }

        .btn-acao:first-child {
            background: #ffc107;
        }

        .btn-acao:last-child {
            background: #f44336;
            color: white;
        }
    </style>
</head>

<body>

    <h2>Cadastro</h2>

    <div class="top-buttons">
        <button type="button" onclick="abrirModal()">Pesquisar</button>
        <button type="button" onclick="limparFormulario()">Novo</button>
    </div>

    <form id="formPessoa">
        <input type="hidden" id="pessoa_id">

        <div class="form-group">
            <label>Nome</label>
            <input type="text" id="nome">
        </div>

        <div class="form-group">
            <label>Descrição</label>
            <input type="text" id="descricao">
        </div>

        <div class="form-group">
            <label>Preço</label>
            <input type="number" id="preco">
        </div>

        <div class="form-group">
            <label>Estoque</label>
            <input type="number" id="estoque">
        </div>

        <div class="form-group">
            <label>Categoria</label>
            <input type="text" id="categoria">
        </div>

        <button type="submit">Salvar</button>
    </form>

    <!-- Modal -->
    <div id="modalPesquisa">
        <div class="modal-content">
            <span class="btn-fechar" onclick="fecharModal()">Fechar</span>
            <h3>Registros</h3>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Preço</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela"></tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/produtos';

        const form = document.getElementById('formPessoa');
        const tabela = document.getElementById('tabela');
        const modal = document.getElementById('modalPesquisa');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const payload = {
                nome: nome.value,
                descricao: descricao.value,
                preco: preco.value,
                estoque: estoque.value,
                categoria: categoria.value
            };

            await fetch(API_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });

            alert('Salvo!');
            limparFormulario();
        });

        async function carregar() {
            const res = await fetch(API_URL);
            const data = await res.json();

            tabela.innerHTML = '';

            data.forEach(p => {
                tabela.innerHTML += `
                    <tr>
                        <td>${p.id}</td>
                        <td>${p.nome}</td>
                        <td>${p.preco}</td>
                        <td>
                            <button onclick="editar(${p.id})">Editar</button>
                            <button onclick="deletar(${p.id})">Excluir</button>
                        </td>
                    </tr>
                `;
            });
        }

        function abrirModal() {
            modal.style.display = 'block';
            carregar();
        }

        function fecharModal() {
            modal.style.display = 'none';
        }

        function limparFormulario() {
            form.reset();
        }
    </script>

</body>
</html>
