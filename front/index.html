<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Pessoa</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

    <div class="min-h-screen bg-gradient-to-br from-slate-50 to-indigo-100 p-5 lg:p-8 py-8">
        <div class="max-w-2xl mx-auto bg-white shadow-2xl rounded-3xl p-10 lg:p-12 mt-8 border border-gray-100">
            <h2 class="text-3xl lg:text-4xl font-light text-center text-gray-800 mb-10 tracking-tight">Cadastro de Pessoa</h2>
            
            <div class="flex gap-4 mb-10 justify-center flex-col sm:flex-row">
                <button type="button" class="px-8 py-4 rounded-2xl font-medium text-white bg-gray-500 hover:bg-gray-600 hover:-translate-y-1 transition-all duration-300 shadow-lg hover:shadow-xl flex items-center gap-2 justify-center min-w-[200px]" onclick="abrirModal()">🔍 Pesquisar</button>
                <button type="button" class="px-8 py-4 rounded-2xl font-medium text-white bg-gray-500 hover:bg-gray-600 hover:-translate-y-1 transition-all duration-300 shadow-lg hover:shadow-xl flex items-center gap-2 justify-center min-w-[200px]" onclick="limparFormulario()">➕ Novo</button>
            </div>
            <hr class="border-gray-200 my-10">

            <form id="formPessoa">
        <input type="hidden" id="pessoa_id" name="pessoa_id">

        <div class="space-y-6">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-3 tracking-wide" for="documento">📄 CPF ou CNPJ</label>
                <input type="text" id="documento" name="documento" maxlength="18" required class="w-full p-4 border-2 border-gray-200 rounded-2xl text-lg transition-all duration-300 focus:border-blue-500 focus:ring-4 ring-blue-100 focus:outline-none hover:border-gray-300 shadow-sm">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-3 tracking-wide" for="nome_razao_social">👤 Nome ou Razão Social</label>
                <input type="text" id="nome_razao_social" name="nome_razao_social" required class="w-full p-4 border-2 border-gray-200 rounded-2xl text-lg transition-all duration-300 focus:border-blue-500 focus:ring-4 ring-blue-100 focus:outline-none hover:border-gray-300 shadow-sm">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-3 tracking-wide" for="nome_social_fantasia">✨ Nome Social ou Nome Fantasia</label>
                <input type="text" id="nome_social_fantasia" name="nome_social_fantasia" class="w-full p-4 border-2 border-gray-200 rounded-2xl text-lg transition-all duration-300 focus:border-blue-500 focus:ring-4 ring-blue-100 focus:outline-none hover:border-gray-300 shadow-sm">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-3 tracking-wide" for="cep">📍 CEP</label>
                <input type="text" id="cep" name="cep" maxlength="9" required class="w-full p-4 border-2 border-gray-200 rounded-2xl text-lg transition-all duration-300 focus:border-blue-500 focus:ring-4 ring-blue-100 focus:outline-none hover:border-gray-300 shadow-sm">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-3 tracking-wide" for="endereco">🏠 Endereço</label>
                <input type="text" id="endereco" name="endereco" required class="w-full p-4 border-2 border-gray-200 rounded-2xl text-lg transition-all duration-300 focus:border-blue-500 focus:ring-4 ring-blue-100 focus:outline-none hover:border-gray-300 shadow-sm">
            </div>

            <div class="grid grid-cols-2 gap-4 items-end">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-3 tracking-wide" for="numero">🔢 Número</label>
                    <input type="text" id="numero" name="numero" required class="w-full p-4 border-2 border-gray-200 rounded-2xl text-lg transition-all duration-300 focus:border-blue-500 focus:ring-4 ring-blue-100 focus:outline-none hover:border-gray-300 shadow-sm">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-3 tracking-wide" for="bairro">🌇 Bairro</label>
                    <input type="text" id="bairro" name="bairro" required class="w-full p-4 border-2 border-gray-200 rounded-2xl text-lg transition-all duration-300 focus:border-blue-500 focus:ring-4 ring-blue-100 focus:outline-none hover:border-gray-300 shadow-sm">
                </div>
            </div>

            <div class="grid grid-cols-2 lg:grid-cols-3 gap-4 items-end">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-3 tracking-wide" for="cidade">🏙️ Cidade</label>
                    <input type="text" id="cidade" name="cidade" required class="w-full p-4 border-2 border-gray-200 rounded-2xl text-lg transition-all duration-300 focus:border-blue-500 focus:ring-4 ring-blue-100 focus:outline-none hover:border-gray-300 shadow-sm">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-3 tracking-wide" for="estado">🌎 Estado</label>
                    <input type="text" id="estado" name="estado" maxlength="2" required class="w-full p-4 border-2 border-gray-200 rounded-2xl text-lg transition-all duration-300 focus:border-blue-500 focus:ring-4 ring-blue-100 focus:outline-none hover:border-gray-300 shadow-sm">
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-3 tracking-wide" for="email">✉️ E-mail</label>
                <input type="email" id="email" name="email" required class="w-full p-4 border-2 border-red-200 rounded-2xl text-lg transition-all duration-300 focus:border-green-500 focus:ring-4 ring-green-100 focus:outline-none hover:border-gray-300 shadow-sm">
                <span id="emailError" class="text-red-500 text-sm mt-2 block font-medium">E-mail inválido</span>
            </div>

            <button type="submit" id="btnSalvar" class="w-full bg-gradient-to-r from-blue-500 to-blue-600 hover:from-blue-600 hover:to-blue-700 text-white py-5 px-8 rounded-2xl text-xl font-semibold shadow-2xl hover:shadow-3xl hover:-translate-y-2 transition-all duration-300 flex items-center justify-center gap-3 mt-8">
                💾 Salvar Cadastro
            </button>
        </div>
    </div>

    <!-- Modal de Pesquisa -->
    <div id="modalPesquisa" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden">
        <div class="mx-auto mt-16 p-0 w-11/12 max-w-6xl max-h-[80vh] overflow-y-auto bg-white rounded-3xl shadow-2xl relative animate-in slide-in-from-top-4 duration-300">
            <button class="absolute top-6 right-6 text-3xl text-gray-500 hover:text-red-500 font-bold transition-colors p-2 rounded-full hover:bg-gray-100" onclick="fecharModal()">&amp;times;</button>
            <div class="p-10">
                <h3 class="text-3xl font-semibold text-gray-800 mb-8">📋 Registros Cadastrados</h3>
                <div class="overflow-x-auto">
                    <table class="w-full rounded-2xl overflow-hidden shadow-xl bg-white border border-gray-200">
                        <thead>
                            <tr class="bg-gradient-to-r from-gray-800 to-gray-900">
                                <th class="px-8 py-6 text-left text-white font-semibold text-lg">ID</th>
                                <th class="px-8 py-6 text-left text-white font-semibold text-lg">Nome/Razão Social</th>
                                <th class="px-8 py-6 text-left text-white font-semibold text-lg">Documento</th>
                                <th class="px-8 py-6 text-left text-white font-semibold text-lg">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaPessoas" class="divide-y divide-gray-200">
                            <!-- Registros inseridos via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/pessoas';
        
        // Elementos do DOM
        const form = document.getElementById('formPessoa');
        const inputId = document.getElementById('pessoa_id');
        const inputDocumento = document.getElementById('documento');
        const inputCep = document.getElementById('cep');
        const inputEmail = document.getElementById('email');
        const emailError = document.getElementById('emailError');
        const modal = document.getElementById('modalPesquisa');
        const tabela = document.getElementById('tabelaPessoas');

        // ================= VALIDAÇÕES =================

        function validarEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }

        function validarCPF(cpf) {
            if (cpf.length !== 11 || /^(\d)\1{10}$/.test(cpf)) return false;
            let soma = 0, resto;
            for (let i = 1; i <= 9; i++) soma += parseInt(cpf.substring(i-1, i)) * (11 - i);
            resto = (soma * 10) % 11;
            if ((resto === 10) || (resto === 11)) resto = 0;
            if (resto !== parseInt(cpf.substring(9, 10))) return false;
            soma = 0;
            for (let i = 1; i <= 10; i++) soma += parseInt(cpf.substring(i-1, i)) * (12 - i);
            resto = (soma * 10) % 11;
            if ((resto === 10) || (resto === 11)) resto = 0;
            if (resto !== parseInt(cpf.substring(10, 11))) return false;
            return true;
        }

        function validarCNPJ(cnpj) {
            if (cnpj.length !== 14 || /^(\d)\1{13}$/.test(cnpj)) return false;
            let tamanho = cnpj.length - 2;
            let numeros = cnpj.substring(0, tamanho);
            let digitos = cnpj.substring(tamanho);
            let soma = 0, pos = tamanho - 7;
            for (let i = tamanho; i >= 1; i--) {
                soma += numeros.charAt(tamanho - i) * pos--;
                if (pos < 2) pos = 9;
            }
            let resultado = soma % 11 < 2 ? 0 : 11 - soma % 11;
            if (resultado != digitos.charAt(0)) return false;
            tamanho = tamanho + 1;
            numeros = cnpj.substring(0, tamanho);
            soma = 0; pos = tamanho - 7;
            for (let i = tamanho; i >= 1; i--) {
                soma += numeros.charAt(tamanho - i) * pos--;
                if (pos < 2) pos = 9;
            }
            resultado = soma % 11 < 2 ? 0 : 11 - soma % 11;
            if (resultado != digitos.charAt(1)) return false;
            return true;
        }

        function validarDocumento(docLimpo) {
            if (docLimpo.length === 11) return validarCPF(docLimpo);
            if (docLimpo.length === 14) return validarCNPJ(docLimpo);
            return false;
        }

        // ================= MÁSCARAS E EVENTOS =================

        inputDocumento.addEventListener('input', function(e) {
            let valor = e.target.value.replace(/\D/g, "");
            if (valor.length <= 11) {
                valor = valor.replace(/(\d{3})(\d)/, "$1.$2").replace(/(\d{3})(\d)/, "$1.$2").replace(/(\d{3})(\d{1,2})$/, "$1-$2");
            } else {
                valor = valor.replace(/^(\d{2})(\d)/, "$1.$2").replace(/^(\d{2})\.(\d{3})(\d)/, "$1.$2.$3").replace(/\.(\d{3})(\d)/, ".$1/$2").replace(/(\d{4})(\d)/, "$1-$2");
            }
            e.target.value = valor;
        });

        inputCep.addEventListener('input', async function(e) {
            let valor = e.target.value.replace(/\D/g, "");
            valor = valor.replace(/(\d{5})(\d)/, "$1-$2");
            e.target.value = valor;

            const cepLimpo = valor.replace(/\D/g, "");
            if (cepLimpo.length === 8) {
                try {
                    const response = await fetch(`https://viacep.com.br/ws/${cepLimpo}/json/`);
                    const data = await response.json();
                    if (!data.erro) {
                        document.getElementById('endereco').value = data.logradouro || '';
                        document.getElementById('bairro').value = data.bairro || '';
                        document.getElementById('cidade').value = data.localidade || '';
                        document.getElementById('estado').value = data.uf || '';
                        document.getElementById('numero').focus();
                    }
                } catch (error) { console.error(error); }
            }
        });

        inputEmail.addEventListener('blur', function(e) {
            emailError.style.display = (!validarEmail(e.target.value) && e.target.value !== "") ? 'block' : 'none';
        });

        // ================= CRUD =================

        // Submissão (Criar / Atualizar)
        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            if (!validarEmail(inputEmail.value)) return alert("E-mail com formato inválido.");
            
            const docLimpo = inputDocumento.value.replace(/\D/g, "");
            if (!validarDocumento(docLimpo)) return alert("CPF ou CNPJ inválido matematicamente.");

            const payload = {
                documento: docLimpo,
                tipo: docLimpo.length > 11 ? 'CNPJ' : 'CPF',
                nome_razao_social: document.getElementById('nome_razao_social').value,
                nome_social_fantasia: document.getElementById('nome_social_fantasia').value,
                cep: inputCep.value.replace(/\D/g, ""),
                endereco: document.getElementById('endereco').value,
                numero: document.getElementById('numero').value,
                bairro: document.getElementById('bairro').value,
                cidade: document.getElementById('cidade').value,
                estado: document.getElementById('estado').value,
                email: inputEmail.value
            };

            const idAtual = inputId.value;
            const url = idAtual ? `${API_URL}/${idAtual}` : API_URL;
            const metodo = idAtual ? 'PUT' : 'POST';

            try {
                const response = await fetch(url, {
                    method: metodo,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    alert('Dados salvos com sucesso!');
                    limparFormulario();
                } else {
                    const errorData = await response.json();
                    alert('Erro: ' + (errorData.error || errorData.message || 'Falha ao salvar.'));
                }
            } catch (error) { alert('Erro de conexão com o servidor.'); }
        });

        // Listar (Read)
        async function carregarPessoas() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                tabela.innerHTML = '';
                data.forEach(p => {
                    tabela.innerHTML += `
                        <tr class="hover:bg-gray-50 transition-colors cursor-pointer border-b border-gray-100 last:border-b-0">
                            <td class="px-8 py-6 font-mono text-gray-900">${p.id}</td>
                            <td class="px-8 py-6 font-medium text-gray-900 max-w-md truncate">${p.nome_razao_social}</td>
                            <td class="px-8 py-6 font-mono text-sm text-gray-600">${p.documento}</td>
                            <td class="px-8 py-6">
                                <button class="px-4 py-2 rounded-xl font-medium text-white bg-orange-500 hover:bg-orange-600 hover:scale-105 transition-all duration-200 shadow-md mr-3 text-sm flex items-center gap-1" onclick="editarPessoa(${p.id})">✏️ Editar</button>
                                <button class="px-4 py-2 rounded-xl font-medium text-white bg-red-500 hover:bg-red-600 hover:scale-105 transition-all duration-200 shadow-md text-sm flex items-center gap-1" onclick="deletarPessoa(${p.id})">🗑️ Excluir</button>
                            </td>
                        </tr>
                    `;
                });
            } catch (error) { alert('Erro ao carregar dados.'); }
        }

        // Preencher para Editar
        async function editarPessoa(id) {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                const pessoa = data.find(p => p.id === id);
                
                if(pessoa) {
                    inputId.value = pessoa.id;
                    document.getElementById('nome_razao_social').value = pessoa.nome_razao_social;
                    document.getElementById('nome_social_fantasia').value = pessoa.nome_social_fantasia || '';
                    document.getElementById('endereco').value = pessoa.endereco || '';
                    document.getElementById('numero').value = pessoa.numero || '';
                    document.getElementById('bairro').value = pessoa.bairro || '';
                    document.getElementById('cidade').value = pessoa.cidade || '';
                    document.getElementById('estado').value = pessoa.estado || '';
                    document.getElementById('email').value = pessoa.email || '';
                    
                    // Dispara eventos artificiais para ativar máscaras
                    inputDocumento.value = pessoa.documento;
                    inputDocumento.dispatchEvent(new Event('input'));
                    inputCep.value = pessoa.cep || '';
                    inputCep.dispatchEvent(new Event('input'));
                    
                    fecharModal();
                }
            } catch (error) { alert('Erro ao buscar dados para edição.'); }
        }

        // Deletar
        async function deletarPessoa(id) {
            if (!confirm('Deseja realmente excluir este registro?')) return;
            try {
                const response = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                if (response.ok) carregarPessoas();
                else alert('Erro ao excluir.');
            } catch (error) { alert('Erro de conexão.'); }
        }

        // ================= CONTROLES DE INTERFACE =================

        function limparFormulario() {
            form.reset();
            inputId.value = '';
            emailError.style.display = 'none';
        }

        function abrirModal() {
            modal.style.display = 'block';
            carregarPessoas();
        }

        function fecharModal() {
            modal.style.display = 'none';
        }

    </script>
</body>
</html>
