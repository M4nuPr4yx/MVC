<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Cadastro</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100">

    <div class="bg-white p-4" style="max-width: 400px; margin: 20px auto;">

        <h2 class="text-lg mb-4">Cadastro de Pessoa</h2>

        <button onclick="abrirModal()" class="bg-blue-500 text-white p-2 mb-2">Pesquisar</button>
        <button onclick="limparFormulario()" class="bg-gray-500 text-white p-2 mb-4">Novo</button>

        <form id="formPessoa">

            <input type="hidden" id="pessoa_id">

            <label>CPF ou CNPJ</label>
            <input type="text" id="documento" class="w-full border p-2 mb-3">

            <label>Nome ou Razão</label>
            <input type="text" id="nome_razao_social" class="w-full border p-2 mb-3">

            <label>Nome Fantasia</label>
            <input type="text" id="nome_social_fantasia" class="w-full border p-2 mb-3">

            <label>CEP</label>
            <input type="text" id="cep" class="w-full border p-2 mb-3">

            <label>Endereço</label>
            <input type="text" id="endereco" class="w-full border p-2 mb-3">

            <label>Número</label>
            <input type="text" id="numero" class="w-full border p-2 mb-3">

            <label>Bairro</label>
            <input type="text" id="bairro" class="w-full border p-2 mb-3">

            <label>Cidade</label>
            <input type="text" id="cidade" class="w-full border p-2 mb-3">

            <label>Estado</label>
            <input type="text" id="estado" class="w-full border p-2 mb-3">

            <label>Email</label>
            <input type="email" id="email" class="w-full border p-2 mb-1">
            <span id="emailError" class="text-red-500 text-sm" style="display:none;">E-mail inválido</span>

            <button class="bg-green-500 text-white p-2 w-full mt-3">Salvar</button>

        </form>
    </div>

    <!-- MODAL -->
    <div id="modalPesquisa" style="display:none;" class="fixed inset-0 bg-black bg-opacity-50">

        <div class="bg-white p-4" style="max-width: 600px; margin: 50px auto;">

            <h3 class="mb-3">Registros</h3>

            <button onclick="fecharModal()" class="bg-red-500 text-white p-1 mb-3">Fechar</button>

            <table class="w-full border">
                <thead>
                    <tr class="bg-gray-200">
                        <th class="border p-2">ID</th>
                        <th class="border p-2">Nome</th>
                        <th class="border p-2">Documento</th>
                        <th class="border p-2">Ações</th>
                    </tr>
                </thead>

                <tbody id="tabelaPessoas"></tbody>
            </table>

        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/pessoas';

        const form = document.getElementById('formPessoa');
        const inputId = document.getElementById('pessoa_id');
        const inputDocumento = document.getElementById('documento');
        const inputCep = document.getElementById('cep');
        const inputEmail = document.getElementById('email');
        const emailError = document.getElementById('emailError');
        const modal = document.getElementById('modalPesquisa');
        const tabela = document.getElementById('tabelaPessoas');

        // ===== VALIDAÇÕES =====

        function validarEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        function validarCPF(cpf) {
            if (cpf.length !== 11 || /^(\d)\1{10}$/.test(cpf)) return false;
            let soma = 0, resto;
            for (let i = 1; i <= 9; i++) soma += parseInt(cpf.substring(i-1, i)) * (11 - i);
            resto = (soma * 10) % 11;
            if (resto >= 10) resto = 0;
            if (resto !== parseInt(cpf.substring(9, 10))) return false;

            soma = 0;
            for (let i = 1; i <= 10; i++) soma += parseInt(cpf.substring(i-1, i)) * (12 - i);
            resto = (soma * 10) % 11;
            if (resto >= 10) resto = 0;
            return resto === parseInt(cpf.substring(10, 11));
        }

        function validarCNPJ(cnpj) {
            if (cnpj.length !== 14 || /^(\d)\1{13}$/.test(cnpj)) return false;
            return true;
        }

        function validarDocumento(doc) {
            if (doc.length === 11) return validarCPF(doc);
            if (doc.length === 14) return validarCNPJ(doc);
            return false;
        }

        // ===== MÁSCARAS =====

        inputDocumento.addEventListener('input', function(e) {
            let valor = e.target.value.replace(/\D/g, "");

            if (valor.length <= 11) {
                valor = valor
                    .replace(/(\d{3})(\d)/, "$1.$2")
                    .replace(/(\d{3})(\d)/, "$1.$2")
                    .replace(/(\d{3})(\d{1,2})$/, "$1-$2");
            } else {
                valor = valor
                    .replace(/^(\d{2})(\d)/, "$1.$2")
                    .replace(/^(\d{2})\.(\d{3})(\d)/, "$1.$2.$3")
                    .replace(/\.(\d{3})(\d)/, ".$1/$2")
                    .replace(/(\d{4})(\d)/, "$1-$2");
            }

            e.target.value = valor;
        });

        inputCep.addEventListener('input', async function(e) {
            let valor = e.target.value.replace(/\D/g, "");
            valor = valor.replace(/(\d{5})(\d)/, "$1-$2");
            e.target.value = valor;

            const cepLimpo = valor.replace(/\D/g, "");
            if (cepLimpo.length === 8) {
                try {
                    const response = await fetch(`https://viacep.com.br/ws/${cepLimpo}/json/`);
                    const data = await response.json();

                    if (!data.erro) {
                        document.getElementById('endereco').value = data.logradouro || '';
                        document.getElementById('bairro').value = data.bairro || '';
                        document.getElementById('cidade').value = data.localidade || '';
                        document.getElementById('estado').value = data.uf || '';
                        document.getElementById('numero').focus();
                    }
                } catch (err) {
                    console.error(err);
                }
            }
        });

        inputEmail.addEventListener('blur', function() {
            emailError.style.display =
                (!validarEmail(inputEmail.value) && inputEmail.value) ? 'block' : 'none';
        });

        // ===== CRUD =====

        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            if (!validarEmail(inputEmail.value)) return alert("Email inválido");

            const doc = inputDocumento.value.replace(/\D/g, "");
            if (!validarDocumento(doc)) return alert("Documento inválido");

            const payload = {
                documento: doc,
                tipo: doc.length > 11 ? 'CNPJ' : 'CPF',
                nome_razao_social: document.getElementById('nome_razao_social').value,
                nome_social_fantasia: document.getElementById('nome_social_fantasia').value,
                cep: inputCep.value.replace(/\D/g, ""),
                endereco: document.getElementById('endereco').value,
                numero: document.getElementById('numero').value,
                bairro: document.getElementById('bairro').value,
                cidade: document.getElementById('cidade').value,
                estado: document.getElementById('estado').value,
                email: inputEmail.value
            };

            const id = inputId.value;
            const url = id ? `${API_URL}/${id}` : API_URL;
            const metodo = id ? 'PUT' : 'POST';

            try {
                const res = await fetch(url, {
                    method: metodo,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    alert("Salvo com sucesso!");
                    limparFormulario();
                } else {
                    alert("Erro ao salvar");
                }
            } catch {
                alert("Erro de conexão");
            }
        });

        async function carregarPessoas() {
            const res = await fetch(API_URL);
            const data = await res.json();

            tabela.innerHTML = "";

            data.forEach(p => {
                tabela.innerHTML += `
                <tr>
                    <td class="border p-2">${p.id}</td>
                    <td class="border p-2">${p.nome_razao_social}</td>
                    <td class="border p-2">${p.documento}</td>
                    <td class="border p-2">
                        <button onclick="editarPessoa(${p.id})">Editar</button>
                        <button onclick="deletarPessoa(${p.id})">Excluir</button>
                    </td>
                </tr>`;
            });
        }

        async function editarPessoa(id) {
            const res = await fetch(API_URL);
            const data = await res.json();
            const p = data.find(x => x.id === id);

            if (!p) return;

            inputId.value = p.id;
            document.getElementById('nome_razao_social').value = p.nome_razao_social;
            document.getElementById('nome_social_fantasia').value = p.nome_social_fantasia;
            document.getElementById('endereco').value = p.endereco;
            document.getElementById('numero').value = p.numero;
            document.getElementById('bairro').value = p.bairro;
            document.getElementById('cidade').value = p.cidade;
            document.getElementById('estado').value = p.estado;
            document.getElementById('email').value = p.email;

            inputDocumento.value = p.documento;
            inputDocumento.dispatchEvent(new Event('input'));

            inputCep.value = p.cep;
            inputCep.dispatchEvent(new Event('input'));

            fecharModal();
        }

        async function deletarPessoa(id) {
            if (!confirm("Excluir?")) return;

            await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
            carregarPessoas();
        }

        function limparFormulario() {
            form.reset();
            inputId.value = "";
            emailError.style.display = "none";
        }

        function abrirModal() {
            modal.style.display = "block";
            carregarPessoas();
        }

        function fecharModal() {
            modal.style.display = "none";
        }
    </script>

</body>

</html>
