<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Pessoas</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 20px;
        }

        h2 {
            text-align: center;
        }

        button {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            background: #4CAF50;
            color: white;
            cursor: pointer;
            margin-right: 5px;
        }

        button:hover {
            opacity: 0.9;
        }

        form {
            background: white;
            padding: 20px;
            border-radius: 10px;
            max-width: 500px;
            margin: 20px auto;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .form-group {
            margin-bottom: 10px;
        }

        label {
            display: block;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 4px;
        }

        input {
            padding: 8px;
            width: 100%;
            border: 1px solid #ccc;
            border-radius: 6px;
            outline: none;
        }

        input:focus {
            border-color: #4CAF50;
        }

        .error {
            color: red;
            font-size: 12px;
            display: none;
        }

        hr {
            margin: 20px 0;
        }

        /* Modal melhorado */
        #modalPesquisa {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
        }

        .modal-content {
            background: #fff;
            margin: 5% auto;
            padding: 20px;
            width: 90%;
            max-width: 800px;
            border-radius: 10px;
        }

        .btn-fechar {
            float: right;
            cursor: pointer;
            color: red;
            font-weight: bold;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th {
            background: #4CAF50;
            color: white;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
        }

        tr:hover {
            background: #f9f9f9;
        }

        .btn-acao {
            padding: 5px 8px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            background: #2196F3;
            color: white;
        }

        .btn-acao:last-child {
            background: #f44336;
        }
    </style>
</head>
<body>

    <h2>Cadastro de Pessoas</h2>
    
    <button type="button" onclick="abrirModal()">Pesquisar Cadastros</button>
    <button type="button" onclick="limparFormulario()">Novo Cadastro</button>
    <hr>

    <form id="formPessoa">
        <input type="hidden" id="pessoa_id" name="pessoa_id">

        <div class="form-group">
            <label>CPF ou CNPJ</label>
            <input type="text" id="documento" name="documento" maxlength="18" required>
        </div>

        <div class="form-group">
            <label>Nome ou Razão Social</label>
            <input type="text" id="nome_razao_social" name="nome_razao_social" required>
        </div>


        <div class="form-group">
            <label>CEP</label>
            <input type="text" id="cep" name="cep" maxlength="9" required>
        </div>

        <div class="form-group">
            <label>Endereço</label>
            <input type="text" id="endereco" name="endereco" required>
        </div>

        <div class="form-group">
            <label>Número</label>
            <input type="text" id="numero" name="numero" required>
        </div>

        <div class="form-group">
            <label>Bairro</label>
            <input type="text" id="bairro" name="bairro" required>
        </div>

        <div class="form-group">
            <label>Cidade</label>
            <input type="text" id="cidade" name="cidade" required>
        </div>

        <div class="form-group">
            <label>Estado</label>
            <input type="text" id="estado" name="estado" maxlength="2" required>
        </div>

        <div class="form-group">
            <label>E-mail</label>
            <input type="email" id="email" name="email" required>
            <span id="emailError" class="error">E-mail inválido</span>
        </div>

        <button type="submit" id="btnSalvar">Salvar</button>
    </form>

    <div id="modalPesquisa">
        <div class="modal-content">
            <span class="btn-fechar" onclick="fecharModal()">X Fechar</span>
            <h3>Registros</h3>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome/Razão</th>
                        <th>Documento</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabelaPessoas"></tbody>
            </table>
        </div>
    </div>
