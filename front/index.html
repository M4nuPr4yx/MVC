<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cadastro de Pessoa</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white shadow-lg rounded-xl p-8 w-full max-w-2xl">
  <h1 class="text-2xl font-bold mb-6 text-center">Cadastro de Pessoa</h1>

  <form id="formCadastro" class="grid grid-cols-2 gap-4">

    <!-- CPF / CNPJ -->
    <input id="documento" name="documento"
      placeholder="CPF ou CNPJ"
      class="col-span-2 p-2 border rounded" required>

    <input name="nome_razao_social"
      placeholder="Nome ou Razão Social"
      class="col-span-2 p-2 border rounded" required>

    <input name="nome_social_fantasia"
      placeholder="Nome Fantasia"
      class="col-span-2 p-2 border rounded">

    <!-- CEP -->
    <input id="cep" name="cep"
      placeholder="CEP"
      class="p-2 border rounded">

    <input id="endereco" name="endereco"
      placeholder="Endereço"
      class="p-2 border rounded">

    <input name="numero"
      placeholder="Número"
      class="p-2 border rounded">

    <input id="bairro" name="bairro"
      placeholder="Bairro"
      class="p-2 border rounded">

    <input id="cidade" name="cidade"
      placeholder="Cidade"
      class="p-2 border rounded">

    <input id="estado" name="estado"
      placeholder="Estado"
      class="p-2 border rounded">

    <input name="email" type="email"
      placeholder="E-mail"
      class="col-span-2 p-2 border rounded">

    <button type="submit"
      class="col-span-2 bg-blue-500 text-white p-2 rounded hover:bg-blue-600">
      Salvar
    </button>

  </form>

  <p id="msg" class="mt-4 text-center"></p>
</div>

<script>
// 🧠 MÁSCARA CPF/CNPJ
const docInput = document.getElementById("documento");

docInput.addEventListener("input", (e) => {
  let valor = e.target.value.replace(/\D/g, "");

  if (valor.length <= 11) {
    valor = valor.replace(/(\d{3})(\d)/, "$1.$2");
    valor = valor.replace(/(\d{3})(\d)/, "$1.$2");
    valor = valor.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
  } else {
    valor = valor.replace(/^(\d{2})(\d)/, "$1.$2");
    valor = valor.replace(/^(\d{2})\.(\d{3})(\d)/, "$1.$2.$3");
    valor = valor.replace(/\.(\d{3})(\d)/, ".$1/$2");
    valor = valor.replace(/(\d{4})(\d)/, "$1-$2");
  }

  e.target.value = valor;
});


// 📦 BUSCAR CEP AUTOMÁTICO
document.getElementById("cep").addEventListener("input", async (e) => {
  let cep = e.target.value.replace(/\D/g, "");

  if (cep.length !== 8) return;

  try {
    const res = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
    const data = await res.json();

    if (data.erro) {
      alert("CEP não encontrado!");
      return;
    }

    document.getElementById("endereco").value = data.logradouro || "";
    document.getElementById("bairro").value = data.bairro || "";
    document.getElementById("cidade").value = data.localidade || "";
    document.getElementById("estado").value = data.uf || "";

  } catch (error) {
    console.error("Erro ao buscar CEP:", error);
  }
});


// 🚀 ENVIAR PARA BACKEND
document.getElementById("formCadastro").addEventListener("submit", async (e) => {
  e.preventDefault();

  const formData = new FormData(e.target);
  const data = Object.fromEntries(formData.entries());

  try {
    const response = await fetch("http://localhost:3000/pessoas", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    await response.json();

    document.getElementById("msg").innerText = "Cadastrado com sucesso!";
    e.target.reset();

  } catch (error) {
    document.getElementById("msg").innerText = "Erro ao cadastrar!";
    console.error(error);
  }
});
</script>

</body>
</html>
